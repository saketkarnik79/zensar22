<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Home | Demo3</title>
  <style>
    body { margin: 0; font-family: Arial, sans-serif; background: #f5f5f5; color: #333; }
    header { background: #004080; color: #fff; position: sticky; top: 0; z-index: 1000; }
    .navbar { display: flex; justify-content: space-between; align-items: center; max-width: 1100px; margin: 0 auto; padding: 1rem; }
    .brand { font-size: 1.25rem; font-weight: 700; }
    nav a { color: #fff; text-decoration: none; margin-left: 1.25rem; }
    nav a:hover { text-decoration: underline; }
    main { max-width: 1100px; margin: 2rem auto; padding: 0 1rem; }
    .hero { background: #fff; padding: 2rem; border-radius: 8px; box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08); }
    footer { background: #222; color: #ddd; padding: 1rem 0; text-align: center; }
    footer a { color: #80b3ff; text-decoration: none; }
    footer a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <header>
    <div class="navbar">
      <div class="brand">Demo3 Home</div>
      <nav>
        <a href="#">Home</a>
        <a href="#">About</a>
        <a href="#">Services</a>
        <a href="#">Contact</a>
      </nav>
    </div>
  </header>
  <main>
    <section class="hero">
      <h1>Welcome to the Demo3 Home Page</h1>
      <p>This HTML5 page includes a top navigation bar and a footer. Use the links above to explore the site.</p>
    </section>
  </main>
  <footer>
    <p>&copy; 2026 Demo3. Built with HTML5.</p>
  </footer>
</body>
</html>
